services:
  - type: web
    name: obrien-idi-api
    env: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OBRIEN_IDI_SECRET
        generateValue: true
      - key: OBRIEN_IDI_TOKEN_TTL_SECONDS
        value: 43200
      - key: CORS_ORIGINS
        value: https://your-netlify-site.netlify.app
